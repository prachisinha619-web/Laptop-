            }
            body{
                background-color:grey;

                height: 100vh;
                display: grid;
                place-content: center;
            }
            div {
                background-color:#141B70;
                width: 400px;
                padding: 30px;

            }
            a {

                border-radius: 5px;

    <body>
        <div>
            <img src="laptop.jpeg" alt="laptop image">

            <a>₹44,999</a>
